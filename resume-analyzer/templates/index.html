<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Resume Analyzer Pro</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <button id="themeToggle" class="theme-btn">🌙 Dark Mode</button>
    <div class="container">
        <h1>AI Resume Analyzer</h1>
        <form method="POST" enctype="multipart/form-data">
            <input type="file" name="resume" accept=".txt,.pdf" required>
            <button type="submit" class="primary-btn">Analyze with AI</button>
        </form>

        {% if score is not none %}
        <div class="results">
            <div class="score-box">
                <span class="score-val">{{ score }}%</span>
                <p>ATS Match</p>
            </div>
            <div class="keyword-grid">
                <div class="col">
                    <h4>✅ Found</h4>
                    {% for word in found %}<span class="tag found">{{ word }}</span>{% endfor %}
                </div>
                <div class="col">
                    <h4>❌ Missing</h4>
                    {% for word in missing %}<span class="tag missing">{{ word }}</span>{% endfor %}
                </div>
            </div>
            <div class="ai-tips">
                <h3>💡  Recommendations</h3>
                <ul>{% for tip in tips %}<li>{{ tip }}</li>{% endfor %}</ul>
            </div>
            <a href="{{ url_for('download', score=score, found=found|join(','), missing=missing|join(',')) }}" class="dl">Download Report</a>
        </div>
        {% endif %}
    </div>
    <script>
        const btn = document.getElementById("themeToggle");
        btn.onclick = () => {
            document.body.classList.toggle("dark-mode");
            btn.innerText = document.body.classList.contains("dark-mode") ? "☀️ Light Mode" : "🌙 Dark Mode";
        };
    </script>
</body>
</html>
